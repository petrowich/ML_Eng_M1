{% extends "base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}
    <div class="profile-container">  <!-- Основной контейнер; стилизуйте в style.css -->
        <h1>Edit Profile</h1>

        {% if success_msg %}
            <p class="success-msg">{{ success_msg }}</p>  <!-- Сообщение об успехе; стилизуйте как зелёный текст -->
        {% endif %}

        <form method="POST" action="/account/profile" class="profile-form">  <!-- Класс для формы -->
            <div class="form-group">
                <label for="name">Name (Full Name):</label>
                <input type="text" id="name" name="name" class="input-field" value="{{ user.name | default('', true) }}" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" class="input-field" value="{{ user.email | default('', true) }}" required>
            </div>

            <button type="submit" class="submit-button">Submit</button>
        </form>
    </div>
{% endblock %}
