version: "3.9"

services:
  app:
    container_name: ml-service-app
    build:
      context: ./app
      dockerfile: Dockerfile
    env_file:
      - ./app/.env
    volumes:
      - app-code:/app
    depends_on:
      - database
      - rabbitmq

  web-proxy:
    container_name: ml-service-web-proxy
    build:
      context: ./web-proxy
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/logs:/var/log/nginx

  rabbitmq:
    container_name: ml-service-rabbitmq
    image: rabbitmq:latest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: always

  database:
    container_name: ml-service-database
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

volumes:
  app-code:
  rabbitmq-data:
  postgres-data: