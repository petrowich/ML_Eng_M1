services:
  app:
    container_name: ml-service-app
    build:
      context: ./app
      dockerfile: Dockerfile
    env_file:
      - app/src/.env
#    volumes:
#      - app-code:/app
    depends_on:
      - database
      - rabbitmq
    networks:
      - internal

  web-proxy:
    container_name: ml-service-web-proxy
    build:
      context: ./web-proxy
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    volumes:
#      - ./web-proxy/conf.d:/etc/nginx/conf.d:ro
#      - ./web-proxy/certs:/etc/nginx/certs:ro
      - nginx_log:/var/log/nginx
    networks:
      - internal

  rabbitmq:
    container_name: ml-service-rabbitmq
    image: rabbitmq:4-alpine
#    ports:
#      - "5672:5672"
#      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "--quiet", "check_running", "&&", "rabbitmq-diagnostics", "--quiet", "check_local_alarms"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - internal
    restart: always

  database:
    container_name: ml-service-database
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
#    ports:
#      - "5432:5432"
    networks:
      - internal
    restart: always

volumes:
#  app-code:
  rabbitmq-data:
  postgres-data:
  nginx_log:

networks:
  internal:
    external: false
    driver: bridge